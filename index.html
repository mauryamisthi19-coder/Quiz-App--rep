<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz App</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Animated Background -->
  <div id="background"></div>

  <!-- Quiz Container -->
  <div class="quiz-container">

    <h1>Quiz App</h1>

    <!-- Top Bar -->
    <div class="top-bar">

      <button id="theme-toggle">
        ☀️ Light Mode
      </button>

      <div id="timer">
        Time: 15
      </div>

    </div>

    <!-- Question -->
    <div id="question-container">

      <h2 id="question">
        Question here
      </h2>

      <div id="answer-buttons" class="btn-grid">

      </div>

    </div>

    <!-- Next Button -->
    <button id="next-btn">
      Next
    </button>

    <!-- Score -->
    <h2 id="score"></h2>

  </div>

  <!-- JavaScript -->
  <script src="script.js"></script>

</body>
</html>
